<body>

    <header>
        <h1>የአስተዳዳሪ መቆጣጠሪያ ገጽ (Admin Dashboard)</h1>
        <p>የደንበኞችን የክፍል ምዝገባ መረጃዎች መቆጣጠሪያ</p>
        <a href="index.html" style="color: #3498db; font-weight: bold; text-decoration: none;">← ወደ ዋናው ዌብሳይት ተመለስ</a>

    <section>
        <h2>የመጡ የምዝገባ ጥያቄዎች (Booking Requests)</h2>
        
        <!-- የደንበኞች ዝርዝር የሚቀመጥበት ሰንጠረዥ -->

            <thead>
                <tr>
                    <th>የደንበኛ ስም</th>

                    <th>የቀናት ብዛት</th>
                </tr>
            </thead>
            <tbody id="booking-list">
                <!-- የደንበኞች መረጃ በጃቫስክሪፕት አማካኝነት እዚህ ውስጥ በራሱ ይገባል -->
            </tbody>
        </table>
    </section>

    <!-- ለዛሬው ስራ የሚጠቅመን አዲስ ጃቫስክሪፕት ፋይል -->
